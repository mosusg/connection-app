<!DOCTYPE html>
<html>
<head>
  <title>Bridge Builder</title>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">
    <h1>Bridge Builder</h1>

    <input id="topicA" placeholder="Enter first topic" />
    <input id="topicB" placeholder="Enter second topic" />

    <div class="slider-container">
      <label for="depthSlider">Bridge Depth</label>
      <input type="range" id="depthSlider" min="1" max="7" value="3" step="1" />
      <div id="depthLabel" class="depth-label">Balanced</div>
    </div>

    <button id="generateBtn">Generate Bridge</button>

    <div id="results"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
